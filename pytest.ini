[pytest]
# =============================================================================
# pytest Configuration — Demo_QA
# =============================================================================

# Minimum pytest version required
minversion = 7.0

# Test discovery paths
testpaths = tests

# Test file discovery pattern
python_files = check_*.py test_*.py

# Test class discovery pattern
python_classes = Check Test

# Test function discovery pattern
python_functions = check_* test_*

# Default command-line options
# -ra: show summary of all non-passing tests
# -q: quiet output (less verbose)
# --tb=short: shorter tracebacks
addopts = -ra -q --tb=short

# =============================================================================
# Logging Configuration
# =============================================================================

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s.%(msecs)03d %(levelname)-8s %(filename)s:%(lineno)d %(message)s
log_cli_date_format = %Y-%m-%dT%H:%M:%S

log_file_level = DEBUG
log_file_format = %(asctime)s.%(msecs)03d %(levelname)-8s %(funcName)s : %(filename)s:%(lineno)d %(message)s
log_file_date_format = %Y-%m-%dT%H:%M:%S

# =============================================================================
# Markers
# =============================================================================

markers =
    smoke: Critical path tests — run on every build (login, cart, checkout)
    regression: Extended coverage tests — run on releases
    android: Android-specific tests
    component(name): Jira component for traceability (e.g., @component("Login"))
    test_type(name): Test classification (functional, smoke, negative, boundary, integration)
    priority(level): Test priority (critical, high, medium, low)
    domain(name): Test domain for organizational grouping
    integration: Tests requiring live Appium/emulator (excluded from unit runs)
